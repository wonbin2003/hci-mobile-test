<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
  />
  <meta name="theme-color" content="#121826" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>알림 반응 실험 앱</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="mobile-app">
    <header class="app-header">
      <div class="header-left">
        <h1>알림 반응 실험</h1>
        <p>2048 수행 중 알림 행동 측정</p>
      </div>
      <div class="header-right">
        <div class="mini-card">
          <span>점수</span>
          <strong id="score">0</strong>
        </div>
        <div class="mini-card">
          <span>최고</span>
          <strong id="bestScore">0</strong>
        </div>
      </div>
    </header>

    <section class="status-panel">
      <div class="status-chip">
        <span>상태</span>
        <strong id="experimentStatus">대기 중</strong>
      </div>
      <div class="status-chip">
        <span>남은 시간</span>
        <strong id="remainingTime">-</strong>
      </div>
      <div class="status-chip">
        <span>현재 조건</span>
        <strong id="currentCondition">-</strong>
      </div>
      <div class="status-chip">
        <span>진행률</span>
        <strong id="progressText">0 / 0</strong>
      </div>
    </section>

    <main class="app-main">
      <section class="notification-section">
        <div id="notificationContainer" class="notification-container">
          <div class="notification-placeholder">
            실험 시작 후 알림이 여기에 표시됩니다.
          </div>
        </div>
      </section>

      <section class="game-section">
        <div class="game-top">
          <h2>2048</h2>
          <p>스와이프로 조작</p>
        </div>

        <div class="game-wrapper">
          <div id="gameBoard" class="board"></div>

          <div id="gameOver" class="game-over hidden">
            <div class="game-over-card">
              <h3>게임 종료</h3>
              <button id="restartBtn" class="primary-btn">다시 시작</button>
            </div>
          </div>
        </div>
      </section>

      <section class="config-section">
        <div class="section-title">
          <h2>실험 설정</h2>
        </div>

        <div class="config-grid">
          <label>
            참가자 ID
            <input type="text" id="participantId" placeholder="예: P01" />
          </label>

          <label>
            실험 시간(분)
            <input type="number" id="experimentMinutes" min="1" value="5" />
          </label>

          <label>
            최소 간격(초)
            <input type="number" id="minInterval" min="3" value="5" />
          </label>

          <label>
            최대 간격(초)
            <input type="number" id="maxInterval" min="5" value="15" />
          </label>

          <label>
            알림 표시 시간(초)
            <input type="number" id="notificationDuration" min="2" value="6" />
          </label>

          <label>
            반복 수
            <input type="number" id="repeatPerCondition" min="1" value="3" />
          </label>
        </div>
      </section>

      <section class="log-section">
        <div class="section-title">
          <h2>최근 로그</h2>
        </div>
        <div id="logPreview" class="log-preview"></div>
      </section>
    </main>

    <nav class="bottom-bar">
      <button id="startExperimentBtn" class="primary-btn">실험 시작</button>
      <button id="resetGameBtn" class="secondary-btn">게임 리셋</button>
      <button id="downloadCsvBtn" class="secondary-btn">CSV 저장</button>
    </nav>
  </div>

  <div id="surveyModal" class="modal hidden">
    <div class="modal-sheet">
      <h2>실험 후 설문</h2>

      <label class="survey-label">
        만족도 (1~5)
        <select id="satisfactionScore">
          <option value="1">1 - 매우 불만족</option>
          <option value="2">2 - 불만족</option>
          <option value="3" selected>3 - 보통</option>
          <option value="4">4 - 만족</option>
          <option value="5">5 - 매우 만족</option>
        </select>
      </label>

      <label class="survey-label">
        이유
        <textarea id="satisfactionReason" rows="4" placeholder="이유를 입력하세요"></textarea>
      </label>

      <button id="submitSurveyBtn" class="primary-btn full-btn">설문 제출</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
